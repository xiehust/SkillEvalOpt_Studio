# skilleval — optimize a user skill against a rubric-judged task set.
# Small-budget demo defaults: exec target (Claude Code) + chat judge/optimizer.
_base_: ../_base_/default.yaml

model:
  target_backend: claude_code_exec
  target: claude-opus-4-8
  optimizer_backend: openai_chat
  optimizer: openai.gpt-5.5
  reasoning_effort: medium

train:
  num_epochs: 2
  train_size: 0          # derive from split
  batch_size: 4
  accumulation: 1

gradient:
  minibatch_size: 4
  merge_batch_size: 4
  analyst_workers: 4

optimizer:
  learning_rate: 4
  max_skills_per_candidate: 2
  # short demo run: skip epoch-level extras to keep the model-call budget small
  use_slow_update: false
  use_meta_skill: false

evaluation:
  use_gate: true
  max_skill_regression: 0.0
  sel_env_num: 0     # full val split
  test_env_num: 0    # full test split
  eval_test: true

env:
  name: skilleval
  skill_init: data/skilleval_demo/report_skill/initial.md
  split_mode: split_dir
  split_dir: data/skilleval_demo/report_tasks
  workers: 3
  timeout: 900
  limit: 0
  # Agentic binary judge (routing + restricted sandbox client). These flatten
  # onto the SkillEvalAdapter constructor (train.py::get_adapter) and become the
  # AgenticJudgeConfig; auto routes binary-artifact tasks to the agentic judge,
  # text tasks stay on the chat judge. judge_sandbox_command is a trusted argv
  # (a bare string is shlex-split, never run through a shell).
  # Deploy note: the sandbox runs system python3 with PYTHONNOUSERSITE=1, so
  # skillopt + its binary-parser deps (mcp, openpyxl, Pillow, python-docx,
  # python-pptx) must be venv- or system-installed, NOT pip --user. On hosts
  # where AppArmor blocks unprivileged bwrap (e.g. Ubuntu 24.04), set
  # judge_sandbox_command: "sudo -n bwrap". See the design doc's Deployment
  # Requirements section.
  judge_mode: auto
  judge_backend: claude_code_exec
  judge_model: ""
  judge_timeout: 300
  judge_effort: low
  judge_cache: true
  judge_sandbox_command: bwrap
  judge_max_evidence_bytes: 536870912
  judge_max_scratch_bytes: 1073741824
  judge_max_render_pixels: 500000000
